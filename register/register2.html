<title>注册 | RS9C</title>
<!-- <link rel="stylesheet" href="/register.css"/> -->
<form id="formRegister2">
    <h1>完成注册</h1>
    <p id="blank1">
        设置昵称<br />
        <input type="text" id="inputNickname" placeholder="在此输入昵称" />
        <input type="hidden" id="inputRSID" autocomplete="username" />
    </p>
    <p id="blank2">
        设置密码<br />
        <input type="password" id="inputPwd" placeholder="在此输入密码" autocomplete="new-password" />
    </p>
    <p id="blank3">
        确认密码<br />
        <input type="password" id="inputPwd2" placeholder="请再次输入密码" autocomplete="new-password" />
    </p>
    <button type="submit" id="btnSubmit">提交</button>
</form>
<script src="/register/register2.min.js"></script>
